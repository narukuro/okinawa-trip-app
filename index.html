<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="あかブロック脱出" />
  <meta name="theme-color" content="#F4F1E9" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>あかブロック脱出</title>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="title">あかブロック脱出</h1>
      <p class="subtitle" id="subtitle">赤いブロックを下の出口へ動かそう</p>
    </header>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">レベル</span>
        <span class="stat-value accent" id="level">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">手数</span>
        <span class="stat-value" id="moves">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">ベスト</span>
        <span class="stat-value" id="best">--</span>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <!-- ブロックはJSで生成 -->
      </div>
      <div class="exit-mark" aria-hidden="true">出口</div>
    </div>

    <div class="controls">
      <button class="btn" id="reset">やりなおし</button>
      <button class="btn btn-ghost" id="howto">遊び方</button>
    </div>

    <footer class="foot">指でブロックをスライド、赤を下の出口へ</footer>
  </div>

  <!-- レベルクリア -->
  <div class="overlay" id="winOverlay" hidden>
    <div class="overlay-card">
      <div class="overlay-stars" id="winStars">★★★</div>
      <h2 id="winTitle">レベル クリア！</h2>
      <p class="overlay-stats" id="winInfo"></p>
      <p class="overlay-note" id="winNote"></p>
      <button class="btn" id="playAgain">次のレベル →</button>
    </div>
  </div>

  <!-- 遊び方 -->
  <div class="overlay" id="howOverlay" hidden>
    <div class="overlay-card overlay-left">
      <h2>遊び方</h2>
      <ul class="howto-list">
        <li>大きな<b>赤いブロック（2×2）</b>を盤の<b>下・中央の出口</b>まで動かすとクリアです。</li>
        <li>ブロックは空いているマスの方向へ<b>指でスライド</b>。盤の外には出せません。</li>
        <li>クリアするたびに<b>レベルが上がり、どんどん難しく</b>なります。</li>
        <li><b>目標手数（最少手数）</b>以内で解けると<b>★3つ</b>。少ない手数を目指そう！</li>
      </ul>
      <button class="btn" id="howClose">とじる</button>
    </div>
  </div>

  <script src="solver.js"></script>
  <script src="app.js"></script>
</body>
</html>
